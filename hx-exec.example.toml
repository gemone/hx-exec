# hx-exec example configuration.
# Place at one of:
#   - ./hx-exec.toml
#   - ${HELIX_CONFIG}/hx-exec.toml
#   - <system-config-dir>/hx-exec/hx-exec.toml

# ---------------------------------------------------------------------------
# Single-table form (no OS matching) — behaves like the original version.
# ---------------------------------------------------------------------------

[alias.rust-analyzer]
cmd = "rust-analyzer"

[shared.angular-19-probe]
args = [
  "--stdio",
  "--tsProbeLocations", "${TS_PROBE}",
  "--ngProbeLocations", "${NG_PROBE}",
  "--angularCoreVersion", "19",
]
env.NODE_MODULES = { cmd = "npm root -g" }
env.TS_PROBE = "${NODE_MODULES}/typescript/lib"
env.NG_PROBE = "${NODE_MODULES}/@angular/language-server/bin"

[alias.angular-lsp]
use = "angular-19-probe"
command = "ngserver"

[alias.with-helix-config]
command = "my-lsp"
args = ["--config", "${HELIX_CONFIG}/my-lsp.toml"]

# ---------------------------------------------------------------------------
# Command-output env binding — bind an env var to the stdout of a command.
#
# Two forms are accepted for each entry in `env`:
#
#   env.FOO = "bar"                          # literal string (existing)
#   env.FOO = { cmd = "npm root -g" }        # command output, run directly
#   env.FOO = { cmd = "npm root -g",         # command output, via shell
#               shell = "pwsh" }
#
# The resolved value is trimmed of trailing whitespace/newlines and:
#   - exported to the child process (as an environment variable), AND
#   - made available to ${FOO} expansion inside `cmd` / `command` / `args`.
# ---------------------------------------------------------------------------

# Resolve npm root without a shell (cross-platform, direct exec):
[alias.eslint-direct]
command = "vscode-eslint-language-server"
args = ["--stdio"]
env.NODE_PATH = { cmd = "npm root -g" }

# ---------------------------------------------------------------------------
# Multi-variant form — pick by OS, optionally wrap through a native shell.
# ---------------------------------------------------------------------------

# Windows uses pwsh; Unix uses bash — same alias name.
[[alias.my-tool]]
os = "windows"
shell = "pwsh"
cmd = "Get-ChildItem $env:APPDATA | Where-Object { $_.Name -match 'helix' }"

[[alias.my-tool]]
os = "unix"
shell = "bash"
cmd = 'ls "${HELIX_CONFIG}" | grep helix'

[[alias.my-tool]]
# Fallback for OSes not matched above.
cmd = "echo no-native-impl"

# Per-OS arg-list variant (no shell):
[[alias.eslint]]
os = "windows"
command = "vscode-eslint-language-server.cmd"
args = ["--stdio"]
# Use pwsh to resolve npm root on Windows:
env.NODE_PATH = { cmd = "npm root -g", shell = "pwsh" }

[[alias.eslint]]
# Applies on macOS/Linux (or anywhere non-Windows via explicit fallback).
command = "vscode-eslint-language-server"
args = ["--stdio"]
env.NODE_PATH = { cmd = "npm root -g" }
