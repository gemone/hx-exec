name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag / version to build (e.g. v0.1.0)"
        required: false
        default: ""

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: hx-exec-linux-x86_64.tar.gz
            binary: hx-exec

          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: hx-exec-macos-x86_64.tar.gz
            binary: hx-exec

          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: hx-exec-macos-aarch64.tar.gz
            binary: hx-exec

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: hx-exec-windows-x86_64.zip
            binary: hx-exec.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      # ── Linux / macOS ────────────────────────────────────────────────────────
      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.binary }}
          tar -czf ${{ matrix.archive_name }} ${{ matrix.binary }}

      # ── Windows ──────────────────────────────────────────────────────────────
      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "${{ matrix.binary }}"
          Compress-Archive -Path "${{ matrix.binary }}" -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            input="${{ github.event.inputs.tag }}"
            echo "value=${input:-manual-$(date +%Y%m%d-%H%M%S)}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: "hx-exec ${{ steps.tag.outputs.value }}"
          draft: false
          prerelease: false
          files: artifacts/**/*
