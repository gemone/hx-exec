name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Build & unit tests ────────────────────────────────────────────────
      - name: Build
        run: cargo build

      - name: Run unit tests
        run: cargo test

      # ── Integration: cross-platform config resolution ─────────────────────
      #
      # The test config defines a `my-tool` alias with three variants:
      #   • os = "windows"  → pwsh / Get-ChildItem
      #   • os = "unix"     → bash / ls
      #   • (fallback)      → echo no-native-impl
      #
      # `hx-exec --print -c my-tool` must return the variant that matches the
      # current runner OS.

      - name: Create test hx-exec.toml (Unix)
        if: runner.os != 'Windows'
        run: |
          cat > hx-exec.toml << 'TOML'
          [[alias.my-tool]]
          os = "windows"
          shell = "pwsh"
          cmd = "Get-ChildItem"

          [[alias.my-tool]]
          os = "unix"
          shell = "bash"
          cmd = "ls"

          [[alias.my-tool]]
          cmd = "echo no-native-impl"
          TOML

      - name: Create test hx-exec.toml (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @'
          [[alias.my-tool]]
          os = "windows"
          shell = "pwsh"
          cmd = "Get-ChildItem"

          [[alias.my-tool]]
          os = "unix"
          shell = "bash"
          cmd = "ls"

          [[alias.my-tool]]
          cmd = "echo no-native-impl"
          '@ | Out-File -FilePath hx-exec.toml -Encoding utf8

      - name: Verify --print resolves unix alias (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          output=$(./target/debug/hx-exec --print -c my-tool)
          echo "Resolved: $output"
          if echo "$output" | grep -qE 'bash|ls'; then
            echo "✓ Unix alias correctly resolved"
          else
            echo "✗ Expected output containing 'bash' or 'ls', got: $output"
            exit 1
          fi

      - name: Verify --print resolves windows alias (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = .\target\debug\hx-exec.exe --print -c my-tool
          Write-Host "Resolved: $output"
          if ($output -match 'Get-ChildItem|pwsh') {
            Write-Host "✓ Windows alias correctly resolved"
          } else {
            Write-Host "✗ Expected output containing 'Get-ChildItem' or 'pwsh', got: $output"
            exit 1
          }

      # ── Integration: HELIX_CONFIG preset resolution ───────────────────────

      - name: Verify HELIX_CONFIG preset resolves (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          output=$(./target/debug/hx-exec --print -- echo '${HELIX_CONFIG}')
          echo "HELIX_CONFIG expands to: $output"
          if [ -z "$output" ]; then
            echo "✗ HELIX_CONFIG resolved to empty string"
            exit 1
          fi
          echo "✓ HELIX_CONFIG resolved: $output"

      - name: Verify HELIX_CONFIG preset resolves (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $output = .\target\debug\hx-exec.exe --print -- echo '${HELIX_CONFIG}'
          Write-Host "HELIX_CONFIG expands to: $output"
          if (-not $output) {
            Write-Host "✗ HELIX_CONFIG resolved to empty string"
            exit 1
          }
          Write-Host "✓ HELIX_CONFIG resolved: $output"
